<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Connect</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --ink:#1a1d21; --muted:#6b7280;
    --line:#e4e7eb; --accent:#0a6cff; --accent-ink:#ffffff; --good:#0a8f3c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-text-size-adjust:100%;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 48px}
  header{margin:6px 2px 16px}
  h1{font-size:22px;margin:0;letter-spacing:-.3px}
  header p{margin:4px 0 0;color:var(--muted);font-size:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:0 0 14px}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 5px}
  .field{margin:0 0 13px}
  .field:last-child{margin-bottom:0}
  input[type=text],input[type=email],textarea{
    width:100%;font:inherit;color:var(--ink);background:#fff;
    border:1px solid var(--line);border-radius:10px;padding:11px 12px;
  }
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,108,255,.12)}
  textarea{resize:vertical;min-height:78px}
  .qrbox{text-align:center;padding:8px 8px 4px}
  #qr{display:inline-block;background:#fff;padding:14px;border-radius:12px;border:1px solid var(--line);width:100%;max-width:320px}
  #qr svg{display:block;width:100%;height:auto}
  .qrhint{color:var(--muted);font-size:13px;margin:10px 4px 0}
  .btnrow{display:flex;gap:10px;margin-top:14px}
  .btn{
    flex:1;font:inherit;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;
    border-radius:10px;padding:12px 14px;border:1px solid var(--line);background:#fff;color:var(--ink);
  }
  .btn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .btn:active{transform:translateY(1px)}
  details{margin-top:2px}
  details>summary{cursor:pointer;font-weight:600;font-size:14px;color:var(--ink);list-style:none;padding:4px 2px}
  details>summary::-webkit-details-marker{display:none}
  details>summary::before{content:"▸ ";color:var(--muted)}
  details[open]>summary::before{content:"▾ "}
  .preview{white-space:pre-wrap;font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
    background:#fafbfc;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:10px;color:#33373d}
  .savednote{font-size:12px;color:var(--good);margin-top:8px;height:14px}
  .sub{font-size:12px;color:var(--muted);margin:-4px 2px 12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Connect</h1>
    <p>Type where we met and what we covered. Show the QR. They scan it, hit send, and the email lands in your inbox with all the context.</p>
  </header>

  <div class="card">
    <div class="field">
      <label for="event">Where we met / event</label>
      <input type="text" id="event" placeholder="e.g. Care Tech Summit, June 2026" autocomplete="off">
    </div>
    <div class="field">
      <label for="spoke">What we spoke about</label>
      <textarea id="spoke" placeholder="e.g. Their LA's sufficiency pressure and the referral data we ran"></textarea>
    </div>
  </div>

  <div class="card qrbox">
    <div id="qr"></div>
    <div class="qrhint">Point a phone camera at this. It opens a pre-filled email to you.</div>
    <div class="qrhint" id="densenote" style="color:#b26b00"></div>
    <div class="btnrow">
      <a class="btn" id="testlink" href="#">Test on this phone</a>
      <button class="btn primary" id="reset" type="button">New person</button>
    </div>
    <details style="margin-top:12px;text-align:left">
      <summary>Preview the email</summary>
      <div class="preview" id="preview"></div>
    </details>
  </div>

  <div class="card">
    <details id="settings">
      <summary>Your details</summary>
      <p class="sub">Saved on this device. Set once.</p>
      <div class="field">
        <label for="to">Your email (where replies land)</label>
        <input type="email" id="to" autocomplete="off">
      </div>
      <div class="field">
        <label for="subject">Subject line</label>
        <input type="text" id="subject" autocomplete="off">
      </div>
      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" autocomplete="off">
      </div>
      <div class="field">
        <label for="company">Company</label>
        <input type="text" id="company" autocomplete="off">
      </div>
      <div class="field">
        <label for="linkedin">LinkedIn URL</label>
        <input type="text" id="linkedin" autocomplete="off">
      </div>
      <div class="field">
        <label for="brief">Short brief (who you are)</label>
        <textarea id="brief"></textarea>
      </div>
      <div class="savednote" id="savednote"></div>
    </details>
  </div>
</div>

<script src="qrcode.js"></script>
<script>
(function(){
  "use strict";

  // ---- Default details (edit in "Your details", saved per device) ----
  var DEFAULTS = {
    to:       "marcus@elyndra.co.uk",
    subject:  "Great to meet you",
    name:     "Marcus Williamson",
    company:  "Elyndra",
    linkedin: "https://www.linkedin.com/in/marcuswilliamson",
    brief:    "We build software and data tools for children's social care: referral matching, sufficiency mapping and bid support for providers and local authorities."
  };

  var $ = function(id){ return document.getElementById(id); };
  var settingIds = ["to","subject","name","company","linkedin","brief"];
  var KEY = "connect.settings.v1";

  // ---- Load / save settings ----
  function loadSettings(){
    var saved = {};
    try { saved = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){}
    settingIds.forEach(function(k){
      $(k).value = (saved[k] != null && saved[k] !== "") ? saved[k] : DEFAULTS[k];
    });
  }
  function saveSettings(){
    var obj = {};
    settingIds.forEach(function(k){ obj[k] = $(k).value; });
    try { localStorage.setItem(KEY, JSON.stringify(obj)); } catch(e){}
    var n = $("savednote"); n.textContent = "Saved";
    clearTimeout(saveSettings._t);
    saveSettings._t = setTimeout(function(){ n.textContent=""; }, 1400);
  }

  // ---- Build the email body ----
  function buildBody(){
    var name = $("name").value.trim();
    var company = $("company").value.trim();
    var linkedin = $("linkedin").value.trim();
    var brief = $("brief").value.trim();
    var event = $("event").value.trim();
    var spoke = $("spoke").value.trim();

    var lines = [];
    lines.push("Hi " + (name || "there") + ",");
    lines.push("");
    lines.push(event ? ("Great to meet you at " + event + ".") : "Great to meet you.");
    if (spoke){
      lines.push("");
      lines.push("What we talked about:");
      lines.push(spoke);
    }
    lines.push("");
    lines.push("I'd like to stay in touch.");
    lines.push("");
    var who = "About " + (name || "") + (company ? (", " + company) : "");
    lines.push(who.trim() + (brief ? (": " + brief) : ""));
    if (linkedin) lines.push((name ? ("Connect with " + name) : "Connect") + " on LinkedIn: " + linkedin);
    return lines.join("\n");
  }

  function buildSubject(){
    var s = $("subject").value.trim() || "Great to meet you";
    var event = $("event").value.trim();
    return event ? (s + " - " + event) : s;
  }

  function buildMailto(){
    var to = $("to").value.trim();
    var subject = buildSubject();
    var body = buildBody();
    return "mailto:" + encodeURIComponent(to) +
           "?subject=" + encodeURIComponent(subject) +
           "&body=" + encodeURIComponent(body);
  }

  // ---- Render ----
  function render(){
    var mailto = buildMailto();
    // QR
    try {
      var qr = qrcode(0, "L");      // auto version, error-correction L (clean screen scan)
      qr.addData(mailto);
      qr.make();
      $("qr").innerHTML = qr.createSvgTag({ cellSize: 6, margin: 2, scalable: true });
      $("densenote").textContent = qr.getModuleCount() >= 109
        ? "Getting dense. Keep notes short for an easy scan." : "";
    } catch(e){
      $("qr").textContent = "Too much text to encode. Trim what you spoke about.";
      $("densenote").textContent = "";
    }
    // Test link + preview
    $("testlink").setAttribute("href", mailto);
    $("preview").textContent = "To: " + $("to").value.trim() +
      "\nSubject: " + buildSubject() + "\n\n" + buildBody();
  }

  // ---- Wire up ----
  loadSettings();
  ["event","spoke"].forEach(function(id){ $(id).addEventListener("input", render); });
  settingIds.forEach(function(id){
    $(id).addEventListener("input", function(){ saveSettings(); render(); });
  });
  $("reset").addEventListener("click", function(){
    $("event").value = ""; $("spoke").value = "";
    $("event").focus(); render();
  });
  render();
})();
</script>
</body>
</html>
